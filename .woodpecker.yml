steps:
  - name: install
    image: node:22
    commands:
      - npm ci

  - name: build
    image: node:22
    commands:
      - npm run build

  - name: deploy
    image: node:22
    commands:
      - npx wrangler pages deploy .svelte-kit/cloudflare --project-name portfoliov2
    environment:
      CLOUDFLARE_API_TOKEN:
        from_secret: cloudflare_api_token
      CLOUDFLARE_ACCOUNT_ID: 20fd6cbb2c526579bb489b1a3a139030
    when:
      event: push
      branch: main
